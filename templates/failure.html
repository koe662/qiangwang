{% extends "base.html" %}

{% block title %}校验失败{% endblock %}

{% block content %}
<section class="panel failure-panel">
    <div class="eyebrow">ACCESS DENIED</div>
    <h1>token 校验失败</h1>
    <p class="lead">{{ error_message }}</p>
    <div class="button-row">
        <a class="button button-primary" href="{{ url_for('set_token') }}">返回并重新提交</a>
    </div>
</section>
{% endblock %}
