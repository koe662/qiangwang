{% extends "base.html" %}

{% block title %}Admin Welcome{% endblock %}

{% block content %}
<section class="panel success-panel">
    <div class="eyebrow">ACCESS GRANTED</div>
    <h1>Admin token verified</h1>
    <p class="lead">Current user: <strong>{{ username }}</strong></p>
    <div class="message-box">
        The token signature is valid and the payload field <code>username</code> is <code>admin</code>.
    </div>
    <div class="flag-card">
        <div class="flag-label">Dynamic Flag</div>
        <code class="flag-value">{{ flag }}</code>
    </div>
    <div class="button-row">
        <a class="button button-secondary" href="{{ url_for('set_token') }}">Back to token form</a>
        <form method="post" action="{{ url_for('logout') }}">
            <button class="button button-primary" type="submit">Clear token</button>
        </form>
    </div>
</section>
{% endblock %}
